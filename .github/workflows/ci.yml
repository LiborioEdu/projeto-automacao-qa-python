name: Continuous Integration - QA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar o ambiente (Python)
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Criar diretório para Relatórios
      run: mkdir -p reports

    - name: Executar os testes de API
      run: |
        PYTHONPATH=. pytest tests/api/ -v --html=reports/api-report.html --self-contained-html

    - name: Executar os testes Web (em modo headless)
      run: |
        PYTHONPATH=. pytest tests/web/ -v --html=reports/web-report.html --self-contained-html

    - name: Gerar e Armazenar Artefatos (Relatórios HTML)
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: relatorios-de-testes
        path: reports/
        retention-days: 7
